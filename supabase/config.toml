# Email transactionnel generique (mode log sans BREVO_API_KEY, envoi reel sinon).
# verify_jwt = false : obligatoire pour les requetes OPTIONS (CORS preflight) que
# les navigateurs envoient SANS header Authorization. Si verify_jwt = true, le
# runtime Edge rejette le preflight avec 401 avant meme d'entrer dans la fonction,
# rendant tout appel depuis le navigateur impossible.
# Securite geree a l'interieur : createClient.auth.getUser() verifie la signature
# JWT cote serveur Supabase. Anonyme -> 401 ; destinataire != email authentifie -> 403.
[functions.send-email]
verify_jwt = false

# ── Scheduled function : brief deadline reminders ─────────────────────────────
# Runs every day at 08:00 UTC.
# Finds briefs due within 48 h and notifies students who haven't submitted.
[functions.brief-reminders]
verify_jwt = false
schedule = "0 8 * * *"

# ── Scheduled function : payment reminders ────────────────────────────────────
# Runs every day at 09:00 UTC.
# Finds payments pending for > 30 days and notifies students + admins.
[functions.payment-reminders]
verify_jwt = false
schedule = "0 9 * * *"
